<div class="card">
  <div class="card-header"><h3 class="card-title">Aggiungi Nuovo Libro</h3></div>
  <div class="card-body">
    <form action="admin.php?page=add_book&action=add" method="POST" enctype="multipart/form-data">
      <div class="mb-3">
        <label class="form-label">Titolo</label>
        <input type="text" name="title" class="form-control" placeholder="Inserisci titolo..." required>
      </div>
      <div class="row">
        <div class="col-lg-6">
          <div class="mb-3">
            <label class="form-label">ISBN</label>
            <input type="text" name="isbn" class="form-control" placeholder="1234567890">
          </div>
        </div>
        <div class="col-lg-3">
          <div class="mb-3">
            <label class="form-label">Prezzo (€)</label>
            <input type="number" step="0.01" name="price" class="form-control" placeholder="0.00" required>
          </div>
        </div>
        <div class="col-lg-3">
          <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" name="stock" class="form-control" value="0" required>
          </div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Descrizione</label>
        <textarea name="description" class="form-control" rows="5"></textarea>
      </div>
      <div class="row">
        <div class="col-lg-6">
            <div class="mb-3">
                <label class="form-label">Autori</label>
                <select name="authors[]" class="form-select" multiple size="5">
                    <[foreach]>
                    <option value="<[a_id]>"><[a_name]></option>
                    <[/foreach]>
                </select>
                <small class="text-muted">Tieni premuto Ctrl per selezioni multiple</small>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="mb-3">
                <label class="form-label">Categorie</label>
                <select name="categories[]" class="form-select" multiple size="5">
                    <[foreach]>
                    <option value="<[c_id]>"><[c_name]></option>
                    <[/foreach]>
                </select>
                <small class="text-muted">Tieni premuto Ctrl per selezioni multiple</small>
            </div>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">Immagine Copertina</label>
        <input type="file" name="cover_image" class="form-control" accept="image/*">
        <small class="form-hint">Trascina qui l'immagine o clicca per selezionarla.</small>
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary">Salva Libro</button>
      </div>
    </form>
  </div>
</div>
