<div class="card">
  <div class="card-header"><h3 class="card-title">Elimina Libri</h3></div>
  <div class="table-responsive">
    <table class="table card-table table-vcenter text-nowrap datatable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Titolo</th>
          <th>ISBN</th>
          <th>Prezzo</th>
          <th>Stock</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <[foreach]>
        <tr>
          <td><[book_id]></td>
          <td><[book_title]></td>
          <td><[book_isbn]></td>
          <td>€<[book_price]></td>
          <td><[book_stock]></td>
          <td class="text-end">
            <form action="admin.php?page=delete_book&action=delete" method="POST" onsubmit="return confirm('Sei sicuro di voler eliminare questo libro?');" style="display:inline;">
              <input type="hidden" name="id" value="<[book_id]>">
              <button type="submit" class="btn btn-sm btn-danger">Elimina</button>
            </form>
          </td>
        </tr>
        <[/foreach]>
      </tbody>
    </table>
  </div>
</div>
