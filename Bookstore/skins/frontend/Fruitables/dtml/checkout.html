<div class="row g-5">
    <div class="col-md-12 col-lg-6 col-xl-7">
        <h1 class="mb-4 text-center">Riepilogo Ordine</h1>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">Prodotti</th>
                        <th scope="col">Prezzo</th>
                        <th scope="col">Quantità</th>
                        <th scope="col">Totale</th>
                    </tr>
                </thead>
                <tbody>
                    <[foreach]>
                    <tr>
                        <td class="py-4"><[item_title]></td>
                        <td class="py-4">€<[item_price]></td>
                        <td class="py-4"><[item_qty]></td>
                        <td class="py-4">€<[item_total]></td>
                    </tr>
                    <[/foreach]>
                    <tr>
                        <td colspan="3" class="text-end fw-bold pt-4">TOTALE DA PAGARE:</td>
                        <td class="fw-bold pt-4">€<[grand_total]></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="col-md-12 col-lg-6 col-xl-5">
        <div class="bg-light rounded p-5">
            <h2 class="mb-4">Dati di Spedizione</h2>
            <form action="checkout.php" method="POST">
                <div class="mb-4">
                    <p class="h5 text-primary fw-bold">Verrà consegnato in: <span class="text-dark"><[delivery_address]></span></p>
                    <small class="text-muted">Puoi modificare l'indirizzo nel tuo profilo.</small>
                </div>
                <div class="row g-4 text-center align-items-center justify-content-center border-bottom py-3">
                    <div class="col-12">
                        <div class="form-check text-start my-3">
                            <input type="checkbox" class="form-check-input bg-primary border-0" id="Payments-1" name="Payments-1" value="Payments-1" checked required>
                            <label class="form-check-label" for="Payments-1">Accetto i termini e le condizioni</label>
                        </div>
                    </div>
                </div>
                <button type="submit" class="btn border-secondary py-3 px-4 text-uppercase w-100 text-primary mt-4">Conferma Ordine</button>
            </form>
        </div>
    </div>
</div>
